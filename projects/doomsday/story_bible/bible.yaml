    speech_style:
      tone: "温和但有力量"
    current_state:
      stage: "觉醒者"
      ability: "治愈（可逆转为攻击）"
      location: "西区幸存者营地"
      emotion: "与陈萧确认感情"
    status: "alive"

  - id: "char_liming"
