project_name: "末日重启"
genre:
  - 末日
  - 科幻
  - 生存
  - 进化

world:
  name: "末日地球"
  core_rules:
    - "病毒爆发后，人类文明崩溃，幸存者必须进化才能生存"
    - "进化者获得超凡能力，但代价是人性逐渐丧失"
    - "资源稀缺，信任是奢侈品"
  power_system:
    type: "进化"
    stages:
      - name: "觉醒者"
        description: "初步觉醒，获得单一能力"
      - name: "进化者"
        description: "能力强化，身体开始变异"
      - name: "超越者"
        description: "完全超越人类极限，恢复能力极强"
      - name: "新人类"
        description: "进化终点，成为新物种"
  factions:
    - name: "幸存者联盟"
      type: "人类抵抗组织"
      goal: "重建人类文明"
      members:
        - "西区营地（张强）"
        - "铁壁营地（赵刚）"
        - "希望营地（李雪）"
      status: "活跃，第一卷战役胜利"
    - name: "进化教派"
      type: "进化者组织"
      goal: "推动自然进化"
      leader: "先知"
      status: "与联盟结盟"
    - name: "暗影议会"
      type: "神秘组织"
      goal: "控制末日进程，创造新人类"
      status: "遭受重创，但核心依然存在"
  locations:
    - name: "废墟都市"
      type: "城市废墟"
    - name: "西区幸存者营地"
      type: "幸存者基地"
      status: "活跃"
    - name: "铁壁营地"
      type: "幸存者基地"
      leader: "赵刚"
    - name: "希望营地"
      type: "幸存者基地"
      leader: "李雪"
    - name: "圣殿"
      type: "进化教派基地"
      leader: "先知"
    - name: "孵化场"
      type: "暗影议会实验基地"
      status: "已毁灭"
    - name: "深渊"
      type: "暗影议会核心基地"
      status: "未知"

characters:
  - id: "char_chenxiao"
    name: "陈萧"
    role: "protagonist"
    gender: "male"
    age_start: 28
    personality_core:
      - "冷静"
      - "理性"
      - "保护欲强"
      - "内疚感重"
    flaws:
      - "过度压抑情感"
      - "难以信任他人"
      - "对过去无法释怀"
    growth_arc: "从逃避者成长为领袖"
    speech_style:
      tone: "简洁，不废话"
      habits:
        - "喜欢用行动代替语言"
        - "关键时刻话更少"
    secrets:
      - "他是病毒爆发前的研究员，知道病毒真相"
      - "他的父亲是暗影议会创始人"
      - "他的时间感知能力是父亲实验的结果"
    current_state:
      stage: "进化者"
      ability: "时间操控（可让时间变慢或倒流）"
      location: "西区幸存者营地"
      health: "精力消耗大，需要休息"
      emotion: "坚定，对林若表达感情"
      resources:
        - "匕首"
        - "联盟支持"
        - "进化教派盟友"
    first_appearance: 1
    status: "alive"

  - id: "char_linruo"
    name: "林若"
    role: "heroine"
    gender: "female"
    age_start: 24
