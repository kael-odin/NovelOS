foreshadowings:
  - id: "f001"
    title: "病毒的真相"
    planted_at: 1
    description: "病毒不是自然变异，而是暗影议会制造的进化催化剂"
    thread_type: "main_mystery"
    importance: "high"
    status: "partially_revealed"
    hints:
      - chapter: 1
        content: "陈萧看到实验室废墟中的文件碎片"
      - chapter: 4
        content: "李明确认病毒是人为制造"
      - chapter: 8
        content: "陈父揭示病毒是筛选器，目的是创造新人类"
      - chapter: 12
        content: "先知揭示暗影议会想创造'神'"
    planned_resolution:
      chapter: 100
      description: "揭示暗影议会的最终计划"

  - id: "f002"
    title: "陈萧的过去"
    planted_at: 1
    description: "陈萧曾是研究员，对病毒爆发负有责任"
    thread_type: "identity"
    importance: "high"
    status: "revealed"
    hints:
      - chapter: 1
        content: "陈萧看到实验室时表情异常"
      - chapter: 4
        content: "张强认出陈萧，说一年前救过他"
      - chapter: 5
        content: "陈萧坦白自己是病毒研究者"
      - chapter: 8
        content: "陈父揭示陈萧是他的儿子，能力是实验结果"
    planned_resolution:
      chapter: 50
      description: "陈萧完全接受自己的身份，决定自己的道路"

  - id: "f003"
    title: "暗影议会的阴谋"
    planted_at: 4
    description: "暗影议会在推动人类进化，病毒只是第一步"
    thread_type: "main_plot"
    importance: "high"
    status: "active"
    hints:
      - chapter: 4
        content: "李明透露病毒是计划的一部分"
      - chapter: 6
        content: "暗影议会发动大规模攻击"
      - chapter: 7
        content: "孵化场揭示人体实验"
      - chapter: 8
        content: "陈父揭示进化计划"
      - chapter: 12
        content: "先知揭示暗影议会想创造'神'"
    planned_resolution:
      chapter: 200
      description: "陈萧对抗暗影议会最终计划"

  - id: "f004"
    title: "陈萧的母亲"
    planted_at: 8
    description: "陈萧的母亲在病毒爆发时死亡，她拒绝进化"
    thread_type: "backstory"
    importance: "medium"
    status: "partially_revealed"
    hints:
      - chapter: 8
        content: "陈父提到陈萧的母亲选择了死亡"
      - chapter: 12
        content: "陈萧在进化之泉中看到母亲的幻象"
    planned_resolution:
      chapter: 80
      description: "揭示陈萧母亲的真实故事"

  - id: "f005"
    title: "王刚的背叛"
    planted_at: 6
    description: "王刚逃走后，会在暗影议会中扮演什么角色？"
    thread_type: "subplot"
    importance: "medium"
    status: "active"
    hints:
      - chapter: 6
        content: "王刚趁乱逃走"
    planned_resolution:
      chapter: 60
      description: "王刚再次出现，可能成为关键角色"

  - id: "f006"
    title: "深渊的秘密"
    planted_at: 15
    description: "暗影议会的核心基地'深渊'隐藏着什么秘密？"
    thread_type: "main_mystery"
    importance: "high"
    status: "active"
    hints:
      - chapter: 15
        content: "陈萧提到深渊是暗影议会的核心"
    planned_resolution:
      chapter: 50
      description: "探索深渊，揭示暗影议会的真正秘密"

timeline:
  - chapter: 1
    date_marker: "末日历 001年 春"
    event: "陈萧在废墟中醒来，前往研究所"
  - chapter: 2
    date_marker: "同日"
    event: "陈萧救出林若，两人成为同伴"
  - chapter: 3
    date_marker: "次日"
    event: "遭遇李明，到达营地"
  - chapter: 4
    date_marker: "同日"
    event: "李明揭示身份，两人到达西区营地，张强认出陈萧"
  - chapter: 5
    date_marker: "数日后"
    event: "陈萧坦白身份，发现内鬼线索"
  - chapter: 6
    date_marker: "当晚"
    event: "内鬼暴露，营地防御战，王刚逃走"
  - chapter: 7
    date_marker: "数日后"
    event: "前往孵化场，周远揭示部分真相，落入陷阱"
  - chapter: 8
    date_marker: "同日"
    event: "孵化场战斗，陈父出现，基地自毁，阿杰牺牲"
  - chapter: 9
    date_marker: "数日后"
    event: "建立联盟，赵刚和李雪加入"
  - chapter: 10
    date_marker: "数日后"
    event: "潜入暗影议会，陈父死亡，联盟正式成立"
  - chapter: 11
    date_marker: "数日后"
    event: "暗影议会袭击营地，猎杀队出现"
  - chapter: 12
    date_marker: "次日"
    event: "前往进化教派，先知帮助陈萧觉醒"
  - chapter: 13
    date_marker: "第三天"
    event: "猎杀队袭击，陈萧一人击退七名进化者"
  - chapter: 14
    date_marker: "同日"
    event: "暗影议会集结大规模部队"
  - chapter: 15
    date_marker: "三天后"
    event: "决战，联盟胜利，李明和夜王被俘"

